<!doctype html>
<html lang="pt-br">

<head>
    <title>Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: aquamarine;
        }
        header{
            background-color: cornflowerblue;
            text-align: right;
        }
        header a{
            text-decoration: none;
            color: white;
        }
        section {
           max-width: 600px;
           margin: auto;
           
        }
        section h1{
            width: 100%;
            height: 100px;
            color: white;
            border-top:  1px solid white;
            border-bottom:  1px solid white;
            background-color: cornflowerblue;
            padding: 5px;
        }
        footer {
            padding: 10px;
            background-color: cornflowerblue;
            
        }
        .area{
        max-width: 200px;
            
        }
        textarea{
            width: 100%;
            resize: none;
            outline: none;
        }
        input[type=submit]{
            color: cornflowerblue;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>

<body>
    <section>
    <header>
        <a href="index.html">Sair</a>
    </header>
    
    <h1 id="h1">oi</h1>
        

    

    <footer>
        <div class="area">
            <form>
            <textarea name="" id="area" required></textarea>
            <input type="submit" value="ok" onclick="postar()">
        </form>
        </div>
    </footer>
    </section>

    <script>
        onload = function(){
            let h1 = document.getElementById("h1")
            let escrita = localStorage.getItem("escrita")
            h1.innerHTML = escrita
        }
        function postar(){
            let h1 = document.getElementById("h1")
            let area = document.getElementById("area").value
            if(area == ""){

            }else{
            h1.innerHTML = area

            localStorage.setItem("escrita", area)
            }
        }
    </script>
</body>

</html>

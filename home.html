<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;

        }

        .container {
            max-width: 805px;
            margin: auto;
            
        }

        header {
            background-color: cornflowerblue;
            text-align: right;
            padding: 10px;
        }

        header a {
            text-decoration: none;
            color: white;
        }

        section {
            height: 200px;
            padding: 20px;
            background-color: cornflowerblue;
            border-top: 1px solid white;
            border-bottom: 1px solid white;
            position: relative;
        }
        span{
            position: absolute;
            right: 2%;
            bottom: 2%;
            color: white;
            display: none;
            font-size: 25px;
            cursor: pointer;
        }

        section h1 {
            font-size: 16px;
            color: white;
        }

        footer {
            background-color: cornflowerblue;
            padding: 20px;
        }

        footer .area {
            width: 200px;

        }

        textarea {
            width: 100%;
            resize: none;
            outline: none;
        }

        input[type="button"] {
            width: 48.6%;
            display: inline-block;
        }
        input[type="reset"] {
            width: 100%;
            padding: 3px;
            display: inline-block;
        }

        @media screen and (max-width: 500px) {

            footer .area {
                width: 100%;
            }
        }
    </style>
</head>

</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<style>
    * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: cornflowerblue;

        }

        .container {
            max-width: 805px;
            margin: auto;
            
        }

        header {
            
            text-align: right;
            padding: 10px;
        }

        header a {
            text-decoration: none;
            color: white;
        }

        section {
            
            padding: 20px;
            
            border-top: 1px solid white;
            border-bottom: 1px solid white;
            position: relative;
            color: white;
        }
        .div{
            background-color: brown;
            padding: 10px;
            border-radius: 5px;
            text-indent: 30px;
        }
		p{
            text-align: justify;
			font-size: 17px;
        }
        img{
            width: 20px;
        }
            
        
        .apagar{
            position: relative;
        }
        span{
            position: absolute;
            right: 25px;
            bottom: 20px;
            color: white;
            display: none;
            font-size: 25px;
            cursor: pointer;
        }

        section #h1 {
            text-indent: 30px;
            min-height: 100px;
            font-size: 16px;
            padding: 10px;
        }

        footer {
            padding: 20px;
        }

        footer .area {
            width: 200px;

        }

        textarea {
            width: 100%;
            resize: none;
            outline: none;
			padding: 5px;
        }

        input[type="button"] {
            width: 48.6%;
            display: inline-block;
        }
        input[type="reset"] {
            width: 100%;
            padding: 3px;
            display: inline-block;
        }

        @media screen and (max-width: 500px) {

            footer .area {
                width: 100%;
            }
        }
</style>
<body>
    <div class="container">
        <header>
            <a href="index.html">Sair</a>
        </header>
        <section>
            <div class="div">
                <h1 style="text-align: center">Feliz Aniversário Eliene ! 🎂 👏🏽 👏🏽</h1><br>
                <p>Nesse dia especial para você, quero lhe desejar muita saúde, paz, amor e muitas alegrias, que continue sendo essa pessoa humilde, gente boa, e dedicada nas coisas que faz, Um grande abraço e muitas felicidades</p>
                <p>Você é uma das minhas pessoas Preferidas <img src="./img/coração.jpg" alt=""></p>
            </div>
            
            <div id="apagar">
                <h1 id="h1"></h1>
                <span onclick="apagar()" id="sumir">✖</span>
            </div>
        </section>
        
        
        <footer>
    
            <div class="area">
                <form>
                    <textarea id="input" rows="3" placeholder="Digite..."></textarea>
                    <!-- <input type="submit" value="ok" onclick="postar()"> -->
                    <input type="reset" value="OK" onclick="postar()">
                </form>
            </div>
    
        </footer>
        </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBXO9LPH-XZKxt5W78oT8n2j7SSuedBNjU",
            authDomain: "textarea-e9dc8.firebaseapp.com",
            projectId: "textarea-e9dc8",
            storageBucket: "textarea-e9dc8.appspot.com",
            messagingSenderId: "169738151392",
            appId: "1:169738151392:web:c4810ec4089f58b043f785",
            measurementId: "G-D5WZPWPNX8"
        }

        firebase.initializeApp(firebaseConfig)
        const area = firebase.firestore()


        area.collection("area").onSnapshot((snapshot) => {
            snapshot.forEach((doc) => {
                let escrita = doc.data()
                let p = document.getElementById("h1")
                let span = document.getElementById("sumir")

                if(escrita.texto == undefined || escrita.texto == ""){
                    
                    p.innerHTML = ""
                    span.setAttribute('style', 'display: none')
                }else{
                    p.innerHTML = escrita.texto
                    span.setAttribute('style', 'display: block')

                }
                
            })
        })

        function postar() {
            let input = document.getElementById("input")
            
            if(input.value.length == ""){
                alert("Campo Vaziu")
            }else{
            area.collection("area").doc("tiFLYZdDat2Hn2FUEatF").update(
                {
                    texto: input.value

                }).then(() => {
                    console.log("documento inserido com sucesso")
                }).catch(err => {
                    console.log(err)
                })
        }
    }

        function apagar(){
    area.collection("area").doc("tiFLYZdDat2Hn2FUEatF").update(
            {
                texto: firebase.firestore.FieldValue.delete()

            }).then(() => {
                console.log("documento inserido com sucesso")
            }).catch(err => {
                console.log(err)
            }) 
        }
    </script>
</body>
</html>
